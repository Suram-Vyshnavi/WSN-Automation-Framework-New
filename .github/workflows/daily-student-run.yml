name: Daily Student Automation Run

on:
  schedule:
    - cron: "30 3 * * *" # Daily at 03:30 UTC (change as needed)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-student-framework:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUN_MODE: single
      PERSONA: student
      STUDENT_USERNAME: leela.genai.prod@yopmail.com
      STUDENT_PASSWORD: Demo@123
      SLOW_MO: "0"
      PDF_MAX_SCREENSHOTS: "20"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java (required for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip wkhtmltopdf

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.29.0
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.zip"
          unzip -q "allure-${ALLURE_VERSION}.zip"
          sudo mv "allure-${ALLURE_VERSION}" /opt/allure
          echo "/opt/allure/bin" >> "$GITHUB_PATH"
          allure --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run framework (student only)
        run: |
          xvfb-run -a python run_tests.py

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: student-reports-${{ github.run_number }}
          path: reports/
          if-no-files-found: warn
