name: Daily Behave Allure

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  behave-allure:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV: qa
      HEADLESS: 'true'
      TRACE_ON: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install Allure CLI
        run: npm install --global allure-commandline

      - name: Prepare report directories
        shell: bash
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/allure-report

      - name: Run Behave suite
        id: behave
        shell: bash
        run: |
          set +e
          python -m behave features -f allure_behave.formatter:AllureFormatter -o reports/allure-results -f pretty
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          if find reports/allure-results -type f | grep -q .; then
            allure generate reports/allure-results --clean -o reports/allure-report
          else
            echo "No Allure result files were produced. Skipping report generation."
          fi

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: reports/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: reports/allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Daily Behave run"
            echo ""
            echo "- Scheduled: daily at 02:00 UTC"
            echo "- Behave exit code: ${{ steps.behave.outputs.exit_code }}"
            echo "- Allure results artifact: allure-results-${{ github.run_number }}"
            echo "- Allure report artifact: allure-report-${{ github.run_number }}"
            echo ""
            echo "The test runtime supports BASE_URL, USERNAME, PASSWORD, and MESSAGE_TEXT environment overrides when you choose to add them later."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job when tests fail
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.behave.outputs.exit_code }}" != "0" ]; then
            echo "Behave failed with exit code ${{ steps.behave.outputs.exit_code }}"
            exit 1
          fi
